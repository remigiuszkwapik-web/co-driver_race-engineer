services:
  forza-data:
    build: .
    image: forza-data
    container_name: forza-data
    restart: unless-stopped
    ports:
      - "3000:3000"      # Web UI
      - "5300:5300/udp"  # Forza Data Out listener
    environment:
      FORZA_PORT: 5300
      FORZA_BIND: 0.0.0.0
      NITRO_PORT: 3000
      NITRO_HOST: 0.0.0.0
    volumes:
      - forza-data:/app/data

volumes:
  forza-data:
