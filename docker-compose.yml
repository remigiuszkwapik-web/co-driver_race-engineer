services:
  co-driver:
    build: .
    image: ${CO_DRIVER_IMAGE:-co-driver:latest}
    container_name: co-driver
    restart: unless-stopped
    ports:
      - "3000:3000"        # Web UI
      - "5300:5300/udp"    # Forza Horizon Data Out (FH5 / FH6)
      - "20777:20777/udp"  # F1 25 / F1 26 UDP telemetry
    environment:
      FORZA_PORT: 5300
      FORZA_BIND: 0.0.0.0
      NITRO_PORT: 3000
      NITRO_HOST: 0.0.0.0
    volumes:
      - co-driver:/app/data

volumes:
  co-driver:
