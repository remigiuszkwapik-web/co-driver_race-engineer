services:
  co-driver:
    build: .
    image: ${CO_DRIVER_IMAGE:-co-driver:latest}
    container_name: co-driver
    restart: unless-stopped
    # Ports are fixed inside the container; to relocate one that clashes on the
    # host, change the left-hand (host) side here, e.g. "5301:5300/udp".
    ports:
      - "3000:3000"        # Web UI
      - "5300:5300/udp"    # Forza Horizon (FH5 / FH6) + Forza Motorsport
      - "20777:20777/udp"  # F1 25 / F1 26
      - "5606:5606/udp"    # Project CARS 2 / AMS2 (SMS UDP)
      - "20778:20778/udp"  # DiRT Rally 2.0 (+ DiRT Rally / DiRT 4)
      - "20789:20789/udp"  # EA Sports WRC
      - "4444:4444/udp"    # BeamNG.drive (OutGauge)
      - "30000:30000/udp"  # Live for Speed (OutGauge)
      - "33740:33740/udp"  # Gran Turismo 7
    environment:
      NITRO_PORT: 3000
      NITRO_HOST: 0.0.0.0
      # Gran Turismo 7 only: set to your console's IP to start its stream.
      # GT7_HOST: 192.168.1.50
    volumes:
      - co-driver:/app/data

volumes:
  co-driver:
